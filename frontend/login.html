<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StreamPremium</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body style="background: var(--bg-sec);">
    <nav>
        <a href="index.html" class="logo">STREAMPREMIUM</a>
        <div class="nav-links">
            <a href="index.html">Back to Home</a>
            <a href="signup.html" class="btn btn-primary">Create Account</a>
        </div>
    </nav>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>
            <div id="message" style="margin-top: 1rem; text-align: center; font-size: 0.9rem;"></div>
            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
                Don't have an account? <a href="signup.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Sign up</a>
            </p>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await api.login(email, password);
                if (response.token) {
                    messageDiv.style.color = '#22c55e';
                    messageDiv.innerText = 'Log in successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    messageDiv.style.color = '#ef4444';
                    messageDiv.innerText = response.message || 'Invalid credentials.';
                }
            } catch (err) {
                messageDiv.style.color = '#ef4444';
                messageDiv.innerText = 'An error occurred during login.';
            }
        });
    </script>
</body>
</html>
