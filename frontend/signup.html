<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | StreamPremium</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body style="background: var(--bg-sec);">
    <nav>
        <a href="index.html" class="logo">STREAMPREMIUM</a>
        <div class="nav-links">
            <a href="index.html">Back to Home</a>
            <a href="login.html" class="btn btn-outline">Login</a>
        </div>
    </nav>
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Your Account</h2>
            <form id="signup-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="role">Account Type</label>
                    <select id="role" style="width: 100%; border: 1px solid var(--border); background: var(--white); color: var(--text-main); padding: 0.75rem; border-radius: 0.5rem; outline: none;">
                        <option value="user">Student (User)</option>
                        <option value="admin">Instructor (Admin)</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Get Started</button>
            </form>
            <div id="message" style="margin-top: 1rem; text-align: center; font-size: 0.9rem;"></div>
            <p style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Login</a>
            </p>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await api.signup(email, password, role);
                if (response.token) {
                    messageDiv.style.color = '#22c55e';
                    messageDiv.innerText = 'Account successfully created! Redirecting...';
                    setTimeout(() => window.location.href = 'dashboard.html', 1500);
                } else {
                    messageDiv.style.color = '#ef4444';
                    messageDiv.innerText = response.message || 'Signup failed.';
                }
            } catch (err) {
                messageDiv.style.color = '#ef4444';
                messageDiv.innerText = 'An error occurred during signup.';
            }
        });
    </script>
</body>
</html>
